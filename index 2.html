<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alien Defender 20</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        #level { font-size: 24px; color: #0f0; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="level">Level: 1</div>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const lvlEl = document.getElementById('level');
    const scoreEl = document.getElementById('score');

    let level = 1, score = 0, gameOver = false;
    let player = { x: 0, y: 0, w: 40, h: 40 };
    let bullets = [], enemies = [];
    let enemySpawnTimer = 0;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.x = canvas.width / 2 - 20;
        player.y = canvas.height - 80;
        requestAnimationFrame(update);
    }

    // Touch Controls
    window.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        player.x = touch.clientX - player.w / 2;
        // Keep inside screen
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    });

    // Auto-fire bullets
    setInterval(() => {
        if (!gameOver) bullets.push({ x: player.x + 18, y: player.y, w: 4, h: 10 });
    }, 200);

    function spawnEnemy() {
        const size = 30;
        enemies.push({
            x: Math.random() * (canvas.width - size),
            y: -size,
            w: size,
            h: size,
            speed: 1 + (level * 0.5) // Speed increases with level
        });
    }

    function update() {
        if (gameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Pixel Art Style)
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(player.x + 15, player.y, 10, 10);
        ctx.fillRect(player.x, player.y + 10, 40, 20);
        ctx.fillRect(player.x + 5, player.y + 30, 30, 5);

        // Update & Draw Bullets
        ctx.fillStyle = "#ffff00";
        bullets.forEach((b, i) => {
            b.y -= 7;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            if (b.y < 0) bullets.splice(i, 1);
        });

        // Update & Draw Enemies
        ctx.fillStyle = "#ff00ff";
        enemySpawnTimer++;
        if (enemySpawnTimer > Math.max(10, 40 - level * 2)) {
            spawnEnemy();
            enemySpawnTimer = 0;
        }

        enemies.forEach((e, i) => {
            e.y += e.speed;
            // Simple alien shape
            ctx.fillRect(e.x + 5, e.y, 20, 10);
            ctx.fillRect(e.x, e.y + 10, 30, 10);
            ctx.fillRect(e.x + 5, e.y + 20, 5, 5);
            ctx.fillRect(e.x + 20, e.y + 20, 5, 5);

            // Collision with Bullets
            bullets.forEach((b, bi) => {
                if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 10;
                    scoreEl.innerText = `Score: ${score}`;
                    if (score % 200 === 0 && level < 20) {
                        level++;
                        lvlEl.innerText = `Level: ${level}`;
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }
                }
            });

            // Collision with Player
            if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) {
                endGame();
            }

            if (e.y > canvas.height) enemies.splice(i, 1);
        });

        requestAnimationFrame(update);
    }

    function endGame() {
        gameOver = true;
        tg.MainButton.setText("GAME OVER - RESTART").show();
        tg.MainButton.onClick(() => location.reload());
    }

    init();
</script>
</body>
</html>
